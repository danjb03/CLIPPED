# Render blueprint for the hosted Clip Engine worker.
# In Render: New + -> Blueprint -> connect danjb03/CLIPPED -> it reads this file.
# Then set the three "sync: false" secrets in the dashboard.
services:
  - type: web
    name: clip-engine-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard            # ~2GB RAM for Chrome/ffmpeg render; "starter" may OOM
    autoDeploy: true
    healthCheckPath: /health
    # Persist uploaded sources + renders across restarts/deploys, so "Drafts"
    # remain re-runnable.
    disk:
      name: clip-output
      mountPath: /app/output
      sizeGB: 10
    # Only rebuild the worker when its own code/image changes — not on UI tweaks,
    # so editing the web app doesn't restart the engine mid-job.
    buildFilter:
      paths:
        - "worker/**"
        - "Dockerfile"
        - ".dockerignore"
        - "render.yaml"
        - "web/package.json"
        - "web/package-lock.json"
        - "web/remotion/**"
        - "web/remotion.config.ts"
    envVars:
      - key: TRANSCRIBE_BACKEND
        value: assemblyai
      - key: CORS_ORIGINS
        value: "*"
      # Keep memory in check on a 2GB box: one render, one Chrome tab at a time.
      - key: RENDER_PARALLEL
        value: "1"
      - key: RENDER_FRAME_CONCURRENCY
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: WORKER_TOKEN
        sync: false
      # Paste exported YouTube cookies (cookies.txt contents) so links download
      # as a logged-in user instead of being bot-blocked. Optional.
      - key: YTDLP_COOKIES
        sync: false
      # Optional residential/rotating proxy URL for bulletproof link downloads.
      - key: YTDLP_PROXY
        sync: false
