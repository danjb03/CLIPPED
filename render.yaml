# Render blueprint for the hosted Clip Engine worker.
# In Render: New + -> Blueprint -> connect danjb03/CLIPPED -> it reads this file.
# Then set the three "sync: false" secrets in the dashboard.
services:
  - type: web
    name: clip-engine-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard            # ~2GB RAM for Chrome/ffmpeg render; "starter" may OOM
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: TRANSCRIBE_BACKEND
        value: assemblyai
      - key: CORS_ORIGINS
        value: "*"
      # Keep memory in check on a 2GB box: one render, one Chrome tab at a time.
      - key: RENDER_PARALLEL
        value: "1"
      - key: RENDER_FRAME_CONCURRENCY
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: WORKER_TOKEN
        sync: false
